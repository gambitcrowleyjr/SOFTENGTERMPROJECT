<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 text-white shadow-lg p-4 mb-8">
        <h1 class="text-2xl font-bold">Diner Inventory System</h1>
    </nav>
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 p-4">
        <a href="/inventory" class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition">
            <h2 class="text-xl font-bold mb-2">📦 Inventory List</h2>
            <p class="text-gray-600">View current stock levels for all items.</p>
        </a>
        <a href="/inventory/unload-orders" class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition">
            <h2 class="text-xl font-bold mb-2">🚛 Unload Orders</h2>
            <p class="text-gray-600">Add new stock as shipments arrive.</p>
        </a>
        <a href="/menu/create" class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition border-2 border-indigo-200">
            <h2 class="text-xl font-bold mb-2">🍳 Create Menu Items</h2>
            <p class="text-gray-600">Define recipes and link them to inventory.</p>
        </a>
        <a href="/menu/waitstaff-orders" class="bg-indigo-600 text-white p-6 rounded-xl shadow-md hover:bg-indigo-700 transition">
            <h2 class="text-xl font-bold mb-2">🛎️ Waitstaff Orders</h2>
            <p>Sell items and automatically update inventory.</p>
        </a>
    </div>
</body>
</html>
