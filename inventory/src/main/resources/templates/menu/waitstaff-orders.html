<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Waitstaff Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🛎️ Waitstaff Order Terminal</h1>
            <a href="/" class="text-indigo-600 hover:underline">Back to Dashboard</a>
        </div>

        <div th:if="${successMessage}" class="mb-6 p-4 bg-green-100 text-green-800 border-l-4 border-green-500 rounded-r shadow-md">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-100 text-red-800 border-l-4 border-red-500 rounded-r shadow-md font-bold">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="menuItem : ${menuItems}" class="bg-white p-6 rounded-2xl shadow-lg border-2 border-transparent hover:border-indigo-500 transition-all flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-black text-gray-900 mb-2" th:text="${menuItem.name}">Diner Burger</h2>
                    <div class="text-sm text-gray-500 mb-4">
                        <span th:each="ing, iter : ${menuItem.ingredients}" th:text="${ing.inventoryItem.name + (iter.last ? '' : ', ')}">Beef, Bun</span>
                    </div>
                </div>
                <form th:action="@{/menu/order}" method="POST">
                    <input type="hidden" name="menuItemId" th:value="${menuItem.id}">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg active:transform active:scale-95 transition">
                        Order - <span th:text="'$' + ${menuItem.price}">$9.99</span>
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(menuItems)}" class="text-center py-20 bg-white rounded-3xl shadow-inner border-2 border-dashed border-gray-300">
            <p class="text-gray-500 text-xl">No menu items created yet.</p>
            <a href="/menu/create" class="mt-4 inline-block text-indigo-600 font-bold">Go create some &rarr;</a>
        </div>
    </div>
</body>
</html>
