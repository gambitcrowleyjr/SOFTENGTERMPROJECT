<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Daily Report</h1>
                <p class="text-gray-500 mt-1" th:text="'Report Date: ' + ${reportDate}">Report Date</p>
            </div>
            <div class="space-x-4">
                <a href="/reports" class="text-indigo-600 hover:underline">Back to Reports</a>
                <a href="/" class="text-indigo-600 hover:underline">Dashboard</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow">
                <p class="text-sm text-gray-500">Menu Items</p>
                <p class="text-2xl font-bold" th:text="${menuItemCount}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow">
                <p class="text-sm text-gray-500">Ingredient Links</p>
                <p class="text-2xl font-bold" th:text="${totalIngredientLinks}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow">
                <p class="text-sm text-gray-500">Estimated Revenue</p>
                <p class="text-2xl font-bold text-blue-600" th:text="'$' + ${totalPotentialRevenue}">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow">
                <p class="text-sm text-gray-500">Estimated Profit</p>
                <p class="text-2xl font-bold text-green-600" th:text="'$' + ${estimatedProfit}">$0.00</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow p-6">
            <h2 class="text-2xl font-bold mb-4">Menu Summary</h2>

            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left">Item Name</th>
                            <th class="px-4 py-3 text-left">Price</th>
                            <th class="px-4 py-3 text-left"># of Ingredients</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${menuItems}" class="border-b">
                            <td class="px-4 py-3 font-medium" th:text="${item.name}">Burger</td>
                            <td class="px-4 py-3" th:text="'$' + ${item.price}">$0.00</td>
                            <td class="px-4 py-3" th:text="${#lists.size(item.ingredients)}">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
