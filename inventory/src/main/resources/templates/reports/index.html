<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Generate Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Generate Reports</h1>
            <a href="/" class="text-indigo-600 hover:underline">Back to Dashboard</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="/reports/cost-to-price" class="bg-white p-8 rounded-2xl shadow-md hover:shadow-lg transition border-l-8 border-indigo-600">
                <h2 class="text-2xl font-bold mb-3 text-indigo-700">Cost to Price Report</h2>
                <p class="text-gray-600">
                    View each menu item’s ingredient cost, selling price, profit, and margin.
                </p>
            </a>

            <a href="/reports/daily" class="bg-white p-8 rounded-2xl shadow-md hover:shadow-lg transition border-l-8 border-green-600">
                <h2 class="text-2xl font-bold mb-3 text-green-700">Daily Report</h2>
                <p class="text-gray-600">
                    View a summary of menu items, estimated revenue, cost, and profit.
                </p>
            </a>
        </div>
    </div>
</body>
</html>
