<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-700">Manager Access</h1>
        <p class="text-gray-600 mb-6 text-center">Please enter your 4-digit manager auth code.</p>
        
        <div th:if="${errorMessage}" class="mb-4 p-3 bg-red-100 text-red-700 rounded text-sm text-center" th:text="${errorMessage}"></div>

        <form th:action="@{/manager/login}" method="post" class="space-y-4">
            <div>
                <input type="password" name="authCode" maxlength="4" pattern="\d{4}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded text-center text-2xl tracking-[1em] focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="****" autofocus>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition">
                Authenticate
            </button>
            <div class="text-center mt-4">
                <a href="/" class="text-sm text-gray-500 hover:text-indigo-600">Cancel and Back to Menu</a>
            </div>
        </form>
    </div>
</body>
</html>
