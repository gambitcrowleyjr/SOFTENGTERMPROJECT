<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Supply Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">📋 Unload Order Sheets</h1>
            <div class="space-x-4">
                <a href="/" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 shadow transition">Back to Main Menu</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 shadow" role="alert">
            <p th:text="${successMessage}"></p>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">ID</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Date Created</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Status</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Validator</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Items</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr th:each="order : ${orders}" class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-sm text-gray-800" th:text="${order.id}"></td>
                        <td class="px-6 py-4 text-sm text-gray-800" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="px-6 py-4">
                            <span th:class="${order.status.name() == 'PENDING' ? 'bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full text-xs font-semibold' : 'bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-semibold'}"
                                  th:text="${order.status}"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-800 font-mono" th:text="${order.validatedBy ?: '-'}"></td>
                        <td class="px-6 py-4 text-sm text-gray-600" th:text="${order.items.size() + ' items'}"></td>
                        <td class="px-6 py-4">
                            <a th:if="${order.status.name() == 'PENDING'}" 
                               th:href="@{/inventory/supply-orders/validate/{id}(id=${order.id})}" 
                               class="text-indigo-600 hover:text-indigo-900 font-medium">Validate / Unload</a>
                            <span th:if="${order.status.name() != 'PENDING'}" class="text-gray-400">Completed</span>
                        </td>
                    </tr>
                    <tr th:if="${orders.empty}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-500">No supply orders found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Advanced Pagination Controls -->
        <div class="mt-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-md gap-6">
            <div class="flex items-center gap-4">
                <label for="pageSize" class="text-sm font-semibold text-gray-600">Items per page:</label>
                <select id="pageSize" name="size" onchange="changeSize(this.value)" class="p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                    <option value="10" th:selected="${pageSize == 10}">10</option>
                    <option value="25" th:selected="${pageSize == 25}">25</option>
                    <option value="50" th:selected="${pageSize == 50}">50</option>
                    <option value="100" th:selected="${pageSize == 100}">100</option>
                </select>
            </div>

            <nav th:if="${totalPages > 0}" class="flex items-center space-x-1">
                <!-- First Page -->
                <a th:href="@{/inventory/unload-orders(page=0, size=${pageSize})}" 
                   th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-30' : 'hover:bg-indigo-50 text-indigo-600'"
                   class="px-3 py-2 rounded-md transition font-bold" title="First Page">&lt;&lt;</a>
                
                <!-- Previous Page -->
                <a th:href="@{/inventory/unload-orders(page=${currentPage - 1}, size=${pageSize})}" 
                   th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-30' : 'hover:bg-indigo-50 text-indigo-600'"
                   class="px-3 py-2 rounded-md transition font-bold" title="Previous">&lt;</a>

                <!-- Page Numbers -->
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <!-- Show first page, last page, and pages around current -->
                    <th:block th:if="${i == 0 or i == totalPages - 1 or (i >= currentPage - 2 and i <= currentPage + 2)}">
                        <a th:href="@{/inventory/unload-orders(page=${i}, size=${pageSize})}"
                           th:text="${i + 1}"
                           th:classappend="${i == currentPage} ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'"
                           class="px-4 py-2 rounded-md transition font-medium"></a>
                    </th:block>
                    
                    <!-- Ellipses -->
                    <th:block th:if="${(i == 1 and currentPage > 3) or (i == totalPages - 2 and currentPage < totalPages - 4)}">
                        <span class="px-2 text-gray-400">...</span>
                    </th:block>
                </th:block>

                <!-- Next Page -->
                <a th:href="@{/inventory/unload-orders(page=${currentPage + 1}, size=${pageSize})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'pointer-events-none opacity-30' : 'hover:bg-indigo-50 text-indigo-600'"
                   class="px-3 py-2 rounded-md transition font-bold" title="Next">&gt;</a>

                <!-- Last Page -->
                <a th:href="@{/inventory/unload-orders(page=${totalPages - 1}, size=${pageSize})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'pointer-events-none opacity-30' : 'hover:bg-indigo-50 text-indigo-600'"
                   class="px-3 py-2 rounded-md transition font-bold" title="Last Page">&gt;&gt;</a>
            </nav>
        </div>
    </div>

    <script th:inline="javascript">
        function changeSize(size) {
            const url = new URL(window.location.href);
            url.searchParams.set('size', size);
            url.searchParams.set('page', 0); // Reset to first page when changing size
            window.location.href = url.href;
        }
    </script>
</body>
</html>
