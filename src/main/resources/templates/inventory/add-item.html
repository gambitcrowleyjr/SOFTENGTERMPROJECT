<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Inventory Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Add New Inventory Item</h1>
        <form th:action="@{/manager/inventory/add-item}" th:object="${item}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Item Name</label>
                <input type="text" th:field="*{name}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Unit Type</label>
                <select th:field="*{unitType}" id="unitType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2">
                    <option th:each="type : ${T(com.diner.inventory.model.UnitType).values()}" 
                            th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Initial Stock (Units or Pounds)</label>
                <input type="number" step="0.01" th:field="*{stockLevel}" id="stockLevel" value="0" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Total Price of Order</label>
                <input type="number" step="0.01" name="totalPrice" value="0" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2">
            </div>
            <div class="flex space-x-4">
                <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 shadow transition">Add Item</button>
                <a href="/manager/dashboard" class="w-full text-center bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 shadow transition">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const unitTypeSelect = document.getElementById('unitType');
            const stockLevelInput = document.getElementById('stockLevel');

            function updateStep() {
                if (unitTypeSelect.value === 'POUND') {
                    stockLevelInput.step = '0.01';
                } else {
                    stockLevelInput.step = '1';
                    if (stockLevelInput.value) {
                        stockLevelInput.value = Math.round(stockLevelInput.value);
                    }
                }
            }

            unitTypeSelect.addEventListener('change', updateStep);
            updateStep();
        });
    </script>
</body>
</html>
