<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">📦 Current Inventory</h1>
            <div class="space-x-4">
                <a href="/" class="text-indigo-600 hover:underline">Back to Dashboard</a>
                <form th:action="@{/inventory/snapshot}" method="post" class="inline">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Save Snapshot</button>
                </form>
            </div>
        </div>

        <div th:if="${successMessage}" class="mb-6 p-4 bg-green-100 text-green-800 border-l-4 border-green-500 rounded-r shadow-md">
            <p th:text="${successMessage}"></p>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-3 font-semibold text-gray-700">Item Name</th>
                        <th class="px-6 py-3 font-semibold text-gray-700">Stock Level</th>
                        <th class="px-6 py-3 font-semibold text-gray-700">Unit</th>
                        <th class="px-6 py-3 font-semibold text-gray-700">Current Price</th>
                        <th class="px-6 py-3 font-semibold text-gray-700">Previous Price</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr th:each="item : ${items}">
                        <td class="px-6 py-4" th:text="${item.name}">Burger Patty</td>
                        <td class="px-6 py-4" th:classappend="${item.stockLevel < 10 ? 'text-red-600 font-bold' : ''}" th:text="${item.stockLevel}">50</td>
                        <td class="px-6 py-4 text-sm text-gray-500" th:text="${item.unitType}">UNIT</td>
                        <td class="px-6 py-4" th:text="${'$' + #numbers.formatDecimal(item.currentPrice, 1, 2)}">$0.00</td>
                        <td class="px-6 py-4 text-gray-400" th:text="${'$' + #numbers.formatDecimal(item.previousPrice, 1, 2)}">$0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
