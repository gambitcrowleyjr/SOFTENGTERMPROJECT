<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Waste and Shrinkage Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📉 Waste & Shrinkage Audit</h1>
            <a href="/manager/reports" class="text-indigo-600 hover:underline">Back to Reports</a>
        </div>

        <form th:action="@{/manager/audit/results}" method="post" class="bg-white p-8 rounded-3xl shadow-xl">
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Start Snapshot:</label>
                <select name="startId" class="w-full p-3 border border-gray-300 rounded-xl">
                    <option th:each="s : ${snapshots}" th:value="${s.id}" th:text="${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')}"></option>
                </select>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">End Snapshot:</label>
                <select name="endId" class="w-full p-3 border border-gray-300 rounded-xl">
                    <option th:each="s : ${snapshots}" th:value="${s.id}" th:text="${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')}"></option>
                </select>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Generate Audit Report</button>
        </form>
    </div>
</body>
</html>
