<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">🛡️ Manager Dashboard</h1>
            <div class="space-x-4">
                <a href="/" class="text-indigo-600 hover:underline">Exit to Main Menu</a>
                <a href="/manager/logout" class="bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600">Logout</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Inventory Alerts -->
            <a href="/manager/alerts" class="bg-white p-6 rounded-lg shadow-md border-l-4 border-red-500 hover:bg-gray-50 transition">
                <h2 class="text-xl font-bold mb-2">🚨 Inventory Alerts</h2>
                <p class="text-gray-600">View recent stock alerts for high-value items.</p>
            </a>

            <!-- Inventory Configuration -->
            <a href="/manager/inventory-config" class="bg-white p-6 rounded-lg shadow-md border-l-4 border-indigo-500 hover:bg-gray-50 transition">
                <h2 class="text-xl font-bold mb-2">⚙️ Alert Configuration</h2>
                <p class="text-gray-600">Set high-value status and inventory thresholds for items.</p>
            </a>
            
            <!-- Future Placeholder -->
            <div class="bg-gray-200 p-6 rounded-lg shadow-md border-l-4 border-gray-400 opacity-50 cursor-not-allowed">
                <h2 class="text-xl font-bold mb-2">📈 Sales Reports</h2>
                <p class="text-gray-600">Future feature - coming soon.</p>
            </div>

            <!-- Future Placeholder -->
            <div class="bg-gray-200 p-6 rounded-lg shadow-md border-l-4 border-gray-400 opacity-50 cursor-not-allowed">
                <h2 class="text-xl font-bold mb-2">👥 Staff Management</h2>
                <p class="text-gray-600">Future feature - coming soon.</p>
            </div>
        </div>
    </div>
</body>
</html>
