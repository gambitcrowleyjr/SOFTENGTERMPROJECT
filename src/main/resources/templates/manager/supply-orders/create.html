<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Supply Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">📝 Create Order Sheet</h1>
            <a href="/manager/dashboard" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 shadow transition">Back to Dashboard</a>
        </div>

        <div th:if="${errorMessage}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 shadow" role="alert">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <form th:action="@{/manager/supply-orders/create}" method="POST">
                <div class="mb-4">
                    <input type="text" id="itemSearch" placeholder="Search items..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="overflow-y-auto max-h-96 border border-gray-200 rounded-md mb-6">
                    <table class="w-full text-left" id="itemTable">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Item Name</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Current Stock</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Quantity to Order</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr th:each="item : ${items}" class="item-row hover:bg-gray-50 transition">
                                <td class="px-6 py-4 text-sm text-gray-800 font-medium" th:text="${item.name}"></td>
                                <td class="px-6 py-4 text-sm text-gray-600" th:text="${item.stockLevel + ' ' + item.unitType}"></td>
                                <td class="px-6 py-4">
                                    <input type="number" th:step="${item.unitType.name() == 'UNIT' ? '1' : 'any'}" th:name="'item_' + ${item.id}" class="w-32 p-1 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" placeholder="0">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-md hover:bg-indigo-700 shadow-lg font-bold transition">Generate Order Sheet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('itemSearch').addEventListener('keyup', function() {
            const query = this.value.toLowerCase();
            const rows = document.querySelectorAll('.item-row');
            
            rows.forEach(row => {
                const name = row.querySelector('td').textContent.toLowerCase();
                if (name.includes(query)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
