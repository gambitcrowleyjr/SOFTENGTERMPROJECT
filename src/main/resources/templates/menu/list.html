<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">🍳 Diner Menu</h1>
            <div class="space-x-4">
                <a href="/" class="text-indigo-600 hover:underline">Back to Dashboard</a>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div th:each="menuItem : ${menuItems}" class="bg-white p-6 rounded-lg shadow-md border">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl font-bold text-indigo-700" th:text="${menuItem.name}">Classic Burger</h2>
                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-bold" th:text="'$' + ${menuItem.price}">$9.99</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-500 uppercase mb-2">Ingredients:</h3>
                <ul class="space-y-1">
                    <li th:each="ingredient : ${menuItem.ingredients}" class="text-gray-700 flex justify-between">
                        <span th:text="${ingredient.inventoryItem.name}">Beef Patty</span>
                        <span class="text-gray-500" th:text="${ingredient.quantityRequired + ' ' + (ingredient.inventoryItem.unitType == T(com.diner.inventory.model.UnitType).POUND ? 'lbs' : 'units')}">1 unit</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
