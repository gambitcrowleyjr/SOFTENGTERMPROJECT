<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modify Menu Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">✏️ Modify Menu Item: <span th:text="${menuItem.name}"></span></h1>
        <form th:action="@{/manager/menu/modify/{id}(id=${menuItem.id})}" th:object="${menuItem}" method="POST" id="menuForm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Menu Item Name</label>
                    <input type="text" th:field="*{name}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2" placeholder="e.g., Diner Burger">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Category</label>
                    <input type="text" th:field="*{category}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2" placeholder="e.g., Starters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Price ($)</label>
                    <input type="number" step="0.01" th:field="*{price}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 border p-2" placeholder="9.99">
                </div>
            </div>

            <h3 class="text-lg font-bold mb-4 text-gray-800">Ingredients (Recipes)</h3>
            <div id="ingredientsList" class="space-y-4 mb-8">
                <!-- Existing Ingredients -->
                <div th:each="ingredient : ${menuItem.ingredients}" class="ingredient-row flex space-x-4 items-end bg-indigo-50 p-4 rounded-lg">
                    <div class="flex-grow">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Inventory Item</label>
                        <select name="inventoryItemIds" required onchange="updateRowStep(this)" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white border p-2">
                            <option th:each="inv : ${allInventoryItems}" 
                                    th:value="${inv.id}" 
                                    th:data-unit-type="${inv.unitType}"
                                    th:text="${inv.name + ' (' + inv.unitType + ')'}"
                                    th:selected="${inv.id == ingredient.inventoryItem.id}"></option>
                        </select>
                    </div>
                    <div class="w-32">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Qty Required</label>
                        <input type="number" step="0.01" name="quantities" th:value="${ingredient.quantityRequired}" required class="qty-input block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white border p-2">
                    </div>
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-600 hover:text-red-800 p-2">Remove</button>
                </div>
            </div>

            <button type="button" onclick="addIngredientRow()" class="mb-8 text-indigo-600 font-bold hover:text-indigo-800">+ Add Ingredient</button>

            <div class="flex space-x-4">
                <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 shadow transition font-bold">Save Changes</button>
                <a th:href="@{/manager/menu/modify}" class="w-full text-center bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 shadow transition font-bold">Cancel</a>
            </div>
        </form>
    </div>

    <template id="ingredientTemplate">
        <div class="ingredient-row flex space-x-4 items-end bg-indigo-50 p-4 rounded-lg">
            <div class="flex-grow">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Inventory Item</label>
                <select name="inventoryItemIds" required onchange="updateRowStep(this)" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white border p-2">
                    <option value="" disabled selected>Select Item</option>
                    <option th:each="inv : ${allInventoryItems}" 
                            th:value="${inv.id}" 
                            th:data-unit-type="${inv.unitType}"
                            th:text="${inv.name + ' (' + inv.unitType + ')'}"></option>
                </select>
            </div>
            <div class="w-32">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Qty Required</label>
                <input type="number" step="0.01" name="quantities" required class="qty-input block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-white border p-2">
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="text-red-600 hover:text-red-800 p-2">Remove</button>
        </div>
    </template>

    <script>
        function addIngredientRow() {
            const template = document.getElementById('ingredientTemplate');
            const clone = template.content.cloneNode(true);
            document.getElementById('ingredientsList').appendChild(clone);
        }

        function updateRowStep(select) {
            const selectedOption = select.options[select.selectedIndex];
            const unitType = selectedOption ? selectedOption.getAttribute('data-unit-type') : null;
            const row = select.closest('.ingredient-row');
            const qtyInput = row.querySelector('.qty-input');

            if (unitType === 'POUND') {
                qtyInput.step = '0.01';
            } else {
                qtyInput.step = '1';
                if (qtyInput.value) {
                    qtyInput.value = Math.round(qtyInput.value);
                }
            }
        }

        // Initialize existing rows
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('select[name="inventoryItemIds"]').forEach(select => {
                updateRowStep(select);
            });
        });
    </script>
</body>
</html>
