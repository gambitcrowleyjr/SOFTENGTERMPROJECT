<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Open Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🔥 Open Orders</h1>
            <div class="space-x-4">
                <a href="/orders/kitchen" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-700">Kitchen View</a>
                <a href="/orders/new" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700">New Order</a>
                <a href="/orders/history" class="text-indigo-600 hover:underline">Order History</a>
                <a href="/" class="text-indigo-600 hover:underline">Dashboard</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="mb-6 p-4 bg-green-100 text-green-800 border-l-4 border-green-500 rounded-r shadow-md">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-100 text-red-800 border-l-4 border-red-500 rounded-r shadow-md font-bold">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="order : ${orders}" class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 flex flex-col">
                <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Table</span>
                        <h2 class="text-3xl font-black text-indigo-600" th:text="${order.tableNumber}">5</h2>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tighter" 
                              th:classappend="${order.status.name() == 'OPEN' ? 'bg-blue-100 text-blue-700' : (order.status.name() == 'COOKED' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700')}"
                              th:text="${order.status}">OPEN</span>
                        <p class="text-[10px] text-gray-400 mt-1" th:text="${#temporals.format(order.createdAt, 'HH:mm')}">12:30</p>
                    </div>
                </div>
                
                <div class="p-6 flex-grow">
                    <ul class="space-y-4">
                        <li th:each="item : ${order.items}" class="flex justify-between items-center">
                            <span class="text-gray-800 font-medium">
                                <span class="text-indigo-600 font-bold mr-2" th:text="${item.quantity} + 'x'">2x</span>
                                <span th:text="${item.menuItem.name}">Burger</span>
                            </span>
                        </li>
                    </ul>
                </div>

                <div class="p-6 bg-gray-50 border-t border-gray-100 space-y-3">
                    <!-- Workflow buttons -->
                    <form th:if="${order.status.name() == 'OPEN'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="POST">
                        <input type="hidden" name="status" value="COOKED">
                        <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition shadow-lg shadow-orange-200">
                            Mark as Cooked (Deduct Stock)
                        </button>
                    </form>

                    <form th:if="${order.status.name() == 'COOKED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="POST">
                        <input type="hidden" name="status" value="SERVED">
                        <button type="submit" class="w-full bg-blue-500 text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition shadow-lg shadow-blue-200">
                            Mark as Served
                        </button>
                    </form>

                    <form th:if="${order.status.name() == 'SERVED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="POST">
                        <input type="hidden" name="status" value="PAID">
                        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition shadow-lg shadow-green-200">
                            Complete & Pay
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-20 bg-white rounded-3xl shadow-inner border-2 border-dashed border-gray-300">
            <p class="text-gray-500 text-xl">No active orders right now.</p>
            <a href="/orders/new" class="mt-4 inline-block text-indigo-600 font-bold">Start a new ticket &rarr;</a>
        </div>
    </div>
</body>
</html>
