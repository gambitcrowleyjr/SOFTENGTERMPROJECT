<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🛎️ New Ticket</h1>
            <div class="space-x-4">
                <a href="/orders/open" class="text-indigo-600 hover:underline">Open Orders</a>
                <a href="/" class="text-indigo-600 hover:underline">Dashboard</a>
            </div>
        </div>

        <form th:action="@{/orders/new}" method="POST" class="space-y-8">
            <div class="bg-white p-6 rounded-2xl shadow-md border-2 border-indigo-100">
                <label for="tableNumber" class="block text-sm font-medium text-gray-700 mb-1">Table Number</label>
                <input type="text" name="tableNumber" id="tableNumber" required 
                       class="w-full px-4 py-3 rounded-xl border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-xl font-bold"
                       placeholder="Enter table number (e.g. 5, A1)...">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="menuItem : ${menuItems}" class="bg-white p-6 rounded-2xl shadow-lg border-2 border-transparent hover:border-indigo-500 transition-all flex flex-col justify-between">
                    <div>
                        <h2 class="text-xl font-black text-gray-900 mb-2" th:text="${menuItem.name}">Diner Burger</h2>
                        <div class="text-sm text-gray-500 mb-4">
                            <span th:text="'$' + ${menuItem.price}">$9.99</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <label th:for="'item_' + ${menuItem.id}" class="text-sm font-medium text-gray-700">Qty:</label>
                        <input type="number" th:name="'item_' + ${menuItem.id}" th:id="'item_' + ${menuItem.id}" 
                               value="0" min="0" 
                               class="w-20 px-3 py-2 rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(menuItems)}" class="text-center py-20 bg-white rounded-3xl shadow-inner border-2 border-dashed border-gray-300">
                <p class="text-gray-500 text-xl">No menu items created yet.</p>
                <a href="/menu/create" class="mt-4 inline-block text-indigo-600 font-bold">Go create some &rarr;</a>
            </div>

            <div class="sticky bottom-8">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 shadow-2xl active:transform active:scale-95 transition text-xl">
                    Create Ticket
                </button>
            </div>
        </form>
    </div>
</body>
</html>
