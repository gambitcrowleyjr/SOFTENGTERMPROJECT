<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Order Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

<h1 class="text-2xl font-bold mb-4">Create Order Sheet</h1>

<form action="/manager/order-sheet/create" method="post" class="bg-white p-6 rounded shadow max-w-md">
    <label class="block mb-2 font-medium">Item Name</label>
    <input type="text" name="itemName" required class="border p-2 w-full mb-4">

    <label class="block mb-2 font-medium">Quantity Ordered</label>
    <input type="number" name="quantity" required class="border p-2 w-full mb-4">

    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">
        Add Item to Order Sheet
    </button>
</form>

</body>
</html>
